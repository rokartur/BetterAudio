name: Bug Report
description: Create a report to help us improve
labels: ["bug", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the sections below to help everyone identify and fix the bug.
        For crash reports include the app version and OS version (required).
  - type: textarea
    id: description
    attributes:
      label: Describe your issue
      placeholder: When I click here this happens
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to page X
        2. Click here
        3. Click there
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was the expected result?
      placeholder: I expected this to happen
  - type: textarea
    id: screenshots
    attributes:
      label: Put here any screenshots or videos (optional)
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS (remote)
        - Both
      default: macOS
  - type: input
    id: app_version
    attributes:
      label: Application version
      description: Find it in "About BetterAudio" or in the app's menu. (e.g. 1.2.3)
      placeholder: 1.2.3
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: Operating system (name + version)
      description: e.g. macOS 14.2.1 — include platform and version.
      placeholder: macOS 14.2.1
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue! We will get back to you as soon as possible.
